# Isolate the ephemeral namespace — only allow intra-namespace traffic
# and egress to the internet (for image pulls) and the ArgoCD server.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}   # Any pod in this namespace
  egress:
    - to:
        - podSelector: {}   # Any pod in this namespace
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow egress to internet (ECR image pull, etc.)
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
