{{- if .Values.mysql.enabled }}
---
# Schema migration Job — runs once per namespace, before the wager-svc Deployment.
# ArgoCD sync-wave 1 (same wave as MySQL) ensures MySQL is up before this runs.
# wager-svc initContainer waits for this Job to complete before starting.
apiVersion: batch/v1
kind: Job
metadata:
  name: schema-migrate
  labels:
    app: schema-migrate
    app.kubernetes.io/part-of: wager-ephemeral
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: schema-migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Poll MySQL until it accepts connections before running DDL
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL at {{ .Values.mysql.host | default "mysql" }}:{{ .Values.mysql.port }}..."
              until nc -z {{ .Values.mysql.host | default "mysql" }} {{ .Values.mysql.port }}; do
                sleep 3
              done
              echo "MySQL is accepting connections."
      containers:
        - name: migrate
          image: mysql:8.0
          command:
            - sh
            - -c
            - |
              mysql \
                -h {{ .Values.mysql.host | default "mysql" }} \
                -P {{ .Values.mysql.port }} \
                -u root \
                -p"${MYSQL_ROOT_PASSWORD}" \
                {{ .Values.mysql.database }} <<'SQL'

              CREATE TABLE IF NOT EXISTS wager_transactions (
                  id             BIGINT        AUTO_INCREMENT PRIMARY KEY,
                  transaction_id VARCHAR(100)  NOT NULL UNIQUE,
                  game_code      VARCHAR(10)   NOT NULL,
                  player_id      VARCHAR(100)  NOT NULL,
                  wager_amount   DECIMAL(10,2) NOT NULL,
                  status         VARCHAR(50)   NOT NULL,
                  created_at     DATETIME      NOT NULL DEFAULT NOW(),
                  INDEX idx_game_code  (game_code),
                  INDEX idx_player_id  (player_id),
                  INDEX idx_status     (status),
                  INDEX idx_created_at (created_at)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              SELECT 'schema_migrate: wager_transactions table ready.' AS result;
              SQL
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.rootPasswordSecret }}
                  key:  {{ .Values.mysql.rootPasswordKey }}
          resources:
            requests:
              cpu:    50m
              memory: 64Mi
            limits:
              cpu:    200m
              memory: 128Mi
{{- end }}
