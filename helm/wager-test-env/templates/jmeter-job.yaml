{{- if .Values.jmeter.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jmeter
  namespace: {{ .Release.Namespace }}
  labels:
    app: jmeter
    app.kubernetes.io/part-of: wager-ephemeral
---
apiVersion: batch/v1
kind: Job
metadata:
  name: jmeter
  namespace: {{ .Release.Namespace }}
  labels:
    app: jmeter
    app.kubernetes.io/part-of: wager-ephemeral
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: jmeter
        app.kubernetes.io/part-of: wager-ephemeral
    spec:
      serviceAccountName: jmeter
      restartPolicy: Never
      initContainers:
        - name: wait-for-wager
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for wager-svc port..."
              until nc -z wager-svc {{ .Values.wagerSvc.port }}; do
                echo "  not ready, retrying in 3s..."
                sleep 3
              done
              echo "wager-svc is reachable"

        # Wait for Vault secret to be synced before starting JMeter
        - name: wait-for-vault-secret
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for gh-devops-token secret from Vault..."
              until [ -f /vault-secret/token ]; do
                echo "  secret not ready, retrying in 3s..."
                sleep 3
              done
              echo "Vault secret is ready"
          volumeMounts:
            - name: gh-pat
              mountPath: /vault-secret
              readOnly: true

      containers:
        - name: jmeter
          image: "{{ .Values.jmeter.image.repository }}:{{ .Values.jmeter.image.tag }}"
          imagePullPolicy: {{ .Values.jmeter.image.pullPolicy | default "Always" }}
          env:
            - name: BASE_URL
              value: "http://wager-svc:{{ .Values.wagerSvc.port }}"
            - name: GAME_CODE
              value: {{ .Values.global.gameCode | quote }}
            - name: EXPECTED_STATUS
              value: {{ .Values.global.expectedStatus | quote }}
            - name: EXPECTED_RESULT
              value: {{ .Values.global.expectedResult | quote }}
            - name: WAGER_AMOUNT
              value: {{ .Values.global.wagerAmount | quote }}
            - name: TEST_CASE
              value: {{ .Values.global.testCase | quote }}
            - name: RUN_ID
              value: {{ .Values.global.runId | quote }}
            # GitHub PAT from Vault secret — key name must match what Vault stores
            - name: GITHUB_PAT
              valueFrom:
                secretKeyRef:
                  name: gh-devops-token
                  key: token
          resources:
            {{- toYaml .Values.jmeter.resources | nindent 12 }}
          volumeMounts:
            - name: gh-pat
              mountPath: /vault-secret
              readOnly: true

      volumes:
        - name: gh-pat
          secret:
            secretName: gh-devops-token
{{- end }}