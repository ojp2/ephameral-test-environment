---
# GDS ConfigMap — game data (jackpots, draw dates, ticket rules per game)
# Mounted at /home/wiremock/mappings in the wiremock-gds pod
apiVersion: v1
kind: ConfigMap
metadata:
  name: wiremock-gds-mappings
  labels:
    app: wiremock-gds
    app.kubernetes.io/part-of: wager-ephemeral
data:
  game-data.json: |
    {
      "mappings": [
        {
          "name": "GDS - Mega Millions game data",
          "request": { "method": "GET", "urlPathPattern": "/gds/games/MM.*" },
          "response": {
            "status": 200,
            "headers": { "Content-Type": "application/json" },
            "jsonBody": {
              "gameCode": "MM", "gameName": "Mega Millions",
              "gameType": "LOTTERY", "status": "ACTIVE",
              "drawDate": "2026-04-19T21:00:00Z",
              "jackpot": 350000000, "ticketPrice": 2.00, "maxDraws": 26,
              "salesCutoff": "2026-04-19T20:45:00Z",
              "numbers": {
                "main": { "min": 1, "max": 70, "pick": 5 },
                "mega": { "min": 1, "max": 25, "pick": 1 }
              }
            }
          }
        },
        {
          "name": "GDS - PowerBall game data",
          "request": { "method": "GET", "urlPathPattern": "/gds/games/PB.*" },
          "response": {
            "status": 200,
            "headers": { "Content-Type": "application/json" },
            "jsonBody": {
              "gameCode": "PB", "gameName": "PowerBall",
              "gameType": "LOTTERY", "status": "ACTIVE",
              "drawDate": "2026-04-19T22:59:00Z",
              "jackpot": 125000000, "ticketPrice": 2.00, "maxDraws": 26,
              "salesCutoff": "2026-04-19T22:45:00Z",
              "numbers": {
                "main": { "min": 1, "max": 69, "pick": 5 },
                "power": { "min": 1, "max": 26, "pick": 1 }
              }
            }
          }
        },
        {
          "name": "GDS - Pick 5 game data",
          "request": { "method": "GET", "urlPathPattern": "/gds/games/P5.*" },
          "response": {
            "status": 200,
            "headers": { "Content-Type": "application/json" },
            "jsonBody": {
              "gameCode": "P5", "gameName": "Pick 5",
              "gameType": "NUMBERS", "status": "ACTIVE",
              "drawDate": "2026-04-16T14:00:00Z",
              "jackpot": 100000, "ticketPrice": 1.00, "maxDraws": 7,
              "numbers": { "main": { "min": 0, "max": 9, "pick": 5 } }
            }
          }
        },
        {
          "name": "GDS - List all active games",
          "request": { "method": "GET", "url": "/gds/games" },
          "response": {
            "status": 200,
            "headers": { "Content-Type": "application/json" },
            "jsonBody": {
              "games": [
                { "gameCode": "MM", "gameName": "Mega Millions", "status": "ACTIVE", "ticketPrice": 2.00 },
                { "gameCode": "PB", "gameName": "PowerBall",     "status": "ACTIVE", "ticketPrice": 2.00 },
                { "gameCode": "P5", "gameName": "Pick 5",        "status": "ACTIVE", "ticketPrice": 1.00 }
              ]
            }
          }
        },
        {
          "name": "GDS - Health",
          "request": { "method": "GET", "url": "/gds/health" },
          "response": { "status": 200, "jsonBody": { "status": "UP", "service": "GDS Mock" } }
        }
      ]
    }
---
# ESB ConfigMap — account balance + purchase submission
# Mounted at /home/wiremock/mappings in the wiremock-esb pod
apiVersion: v1
kind: ConfigMap
metadata:
  name: wiremock-esb-mappings
  labels:
    app: wiremock-esb
    app.kubernetes.io/part-of: wager-ephemeral
data:
  esb-wager.json: |
    {
      "mappings": [
        {
          "name": "ESB - Balance MM (has funds)",
          "request": {
            "method": "GET", "urlPathPattern": "/esb/account/balance",
            "queryParameters": { "gameCode": { "equalTo": "MM" } }
          },
          "response": {
            "status": 200,
            "headers": { "Content-Type": "application/json" },
            "jsonBody": { "accountId": "ACC-TEST-MM-001", "balance": 50.00, "currency": "USD", "status": "ACTIVE" }
          }
        },
        {
          "name": "ESB - Balance PB (no funds)",
          "request": {
            "method": "GET", "urlPathPattern": "/esb/account/balance",
            "queryParameters": { "gameCode": { "equalTo": "PB" } }
          },
          "response": {
            "status": 200,
            "headers": { "Content-Type": "application/json" },
            "jsonBody": { "accountId": "ACC-TEST-PB-001", "balance": 0.00, "currency": "USD", "status": "ACTIVE" }
          }
        },
        {
          "name": "ESB - Balance P5 (host no issue)",
          "request": {
            "method": "GET", "urlPathPattern": "/esb/account/balance",
            "queryParameters": { "gameCode": { "equalTo": "P5" } }
          },
          "response": {
            "status": 503,
            "headers": { "Content-Type": "application/json" },
            "jsonBody": { "error": "HOST_NO_ISSUE", "message": "ESB host temporarily unavailable" },
            "fixedDelayMilliseconds": 1000
          }
        },
        {
          "name": "ESB - Purchase MM (success)",
          "request": {
            "method": "POST", "url": "/esb/purchase",
            "bodyPatterns": [{ "matchesJsonPath": "$[?(@.gameCode == 'MM')]" }]
          },
          "response": {
            "status": 200,
            "headers": { "Content-Type": "application/json" },
            "jsonBody": {
              "transactionId": "TXN-MM-{{ "{{" }}randomValue type='UUID'{{ "}}" }}",
              "gameCode": "MM", "status": "OK",
              "message": "Purchase successful", "wagerAmount": 2.00,
              "drawDate": "2026-04-19", "ticketNumbers": [7, 14, 23, 44, 61, 9]
            },
            "transformers": ["response-template"]
          }
        },
        {
          "name": "ESB - Purchase PB (no funds)",
          "request": {
            "method": "POST", "url": "/esb/purchase",
            "bodyPatterns": [{ "matchesJsonPath": "$[?(@.gameCode == 'PB')]" }]
          },
          "response": {
            "status": 402,
            "headers": { "Content-Type": "application/json" },
            "jsonBody": { "transactionId": null, "gameCode": "PB", "status": "NO_FUNDS", "message": "Insufficient funds", "errorCode": "ESB-402" }
          }
        },
        {
          "name": "ESB - Health",
          "request": { "method": "GET", "url": "/esb/health" },
          "response": { "status": 200, "jsonBody": { "status": "UP", "service": "ESB Mock" } }
        }
      ]
    }
