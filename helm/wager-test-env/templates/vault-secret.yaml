{{- if .Values.vault.enabled }}
---
# ServiceAccount for Vault authentication in the ephemeral namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: wager-ephemeral
---
# VaultConnection — points to your HCP Vault cluster
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: default
  namespace: {{ .Release.Namespace }}
spec:
  address: "https://SG-HCP-Vault-private-vault-4fda0f99.0a212ba2.z1.hashicorp.cloud:8200"
  skipTLSVerify: false
---
# VaultAuth — uses Kubernetes auth method to authenticate
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: global-auth-local
  namespace: {{ .Release.Namespace }}
spec:
  namespace: admin/sg-is-devops
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: vso-role
    serviceAccount: vault-auth
  vaultAuthGlobalRef:
    name: global-auth
    namespace: vault-secrets-operator-system
---
# VaultStaticSecret — fetches GitHub PAT and creates K8s secret
# JMeter pod reads GITHUB_PAT env var from this secret
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: gh-devops-token
  namespace: {{ .Release.Namespace }}
spec:
  type: kv-v2
  namespace: admin/sg-is-devops
  mount: secrets
  path: secrets/gh-devops-token
  destination:
    name: gh-devops-token
    create: true
  refreshAfter: 10s
  vaultAuthRef: global-auth-local
  syncConfig:
    instantUpdates: true
{{- end }}