{{- if .Values.wiremockGds.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wiremock-gds
  labels:
    app: wiremock-gds
    test-case: {{ .Values.global.testCase }}
spec:
  replicas: {{ .Values.wiremockGds.replicaCount }}
  selector:
    matchLabels:
      app: wiremock-gds
  template:
    metadata:
      labels:
        app: wiremock-gds
    spec:
      containers:
        - name: wiremock-gds
          image: "{{ .Values.wiremockGds.image.repository }}:{{ .Values.wiremockGds.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args: {{ toJson .Values.wiremockGds.args }}
          ports:
            - containerPort: {{ .Values.wiremockGds.port }}
          volumeMounts:
            - name: mappings
              mountPath: /home/wiremock/mappings
              readOnly: true
          readinessProbe:
            httpGet:
              path: /__admin/health
              port: {{ .Values.wiremockGds.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.wiremockGds.resources | nindent 12 }}
      volumes:
        - name: mappings
          configMap:
            name: {{ .Values.wiremockGds.mappingsConfigMap }}
---
apiVersion: v1
kind: Service
metadata:
  name: wiremock-gds
  labels:
    app: wiremock-gds
spec:
  selector:
    app: wiremock-gds
  ports:
    - name: http
      port: {{ .Values.wiremockGds.port }}
      targetPort: {{ .Values.wiremockGds.port }}
  type: ClusterIP
{{- end }}

