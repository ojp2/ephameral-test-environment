name: Wager Ephemeral Test

on:
  workflow_dispatch:
    inputs:
      test_case:
        description: "Test scenario to run"
        required: true
        default: "mega-millions"
        type: choice
        options:
          - mega-millions
          - powerball
          - pick5
      ttl_minutes:
        description: "Namespace TTL (minutes) before force-delete"
        required: false
        default: "30"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches:
      - ephameral-tests

concurrency:
  group: ephemeral-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  ARGOCD_SERVER: argocd-np-server.argocd.svc.cluster.local:80
  ECR_REGISTRY:  891376915593.dkr.ecr.us-east-1.amazonaws.com/upam/base-images/test-image
  AWS_REGION:    us-east-1
  #S3_BUCKET:    YOUR_S3_BUCKET
  IMAGE_TAG:     ${{ github.sha }}
  ARGOCD_OPTS:   "--server argocd-np-server.argocd.svc.cluster.local:80 --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} --plaintext --grpc-web"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Resolve test case and namespace name
  # ─────────────────────────────────────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: arc-runners-sgisdevops
    outputs:
      test_case: ${{ steps.resolve.outputs.test_case }}
      namespace:  ${{ steps.resolve.outputs.namespace }}
      run_id:     ${{ steps.resolve.outputs.run_id }}
    steps:
      - name: Resolve test case and namespace
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TEST_CASE="mega-millions"
            RUN_ID="pr-${{ github.event.pull_request.number }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            TEST_CASE="mega-millions"
            RUN_ID="run-${{ github.run_id }}"
          else
            TEST_CASE="${{ github.event.inputs.test_case }}"
            RUN_ID="run-${{ github.run_id }}"
          fi
          NAMESPACE="wager-test-${RUN_ID}"
          echo "test_case=${TEST_CASE}" >> $GITHUB_OUTPUT
          echo "namespace=${NAMESPACE}"  >> $GITHUB_OUTPUT
          echo "run_id=${RUN_ID}"        >> $GITHUB_OUTPUT
          echo "Test case : ${TEST_CASE}"
          echo "Namespace : ${NAMESPACE}"

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Build and push images to ECR
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build and Push Images
    runs-on: arc-runners-sgisdevops
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Retrieve AWS Credentials from Vault
        run: |
          echo "Sleeping for 10 seconds..."
          sleep 10
          export AWS_ACCESS_KEY_ID=$(kubectl get secrets platform-services-ecr-iam-credentials -o jsonpath={.data.access_key} | base64 -d)
          export AWS_SECRET_ACCESS_KEY=$(kubectl get secrets platform-services-ecr-iam-credentials -o jsonpath={.data.secret_key} | base64 -d)
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 891376915593.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and push wager-app
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          platforms: linux/amd64
          tags: ${{ env.ECR_REGISTRY }}:wager-app-${{ env.IMAGE_TAG }}

      # - name: Build and push wager-jmeter
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     file: ./jmeter-image/Dockerfile
      #     push: true
      #     platforms: linux/amd64
      #     tags: ${{ env.ECR_REGISTRY }}:wager-jmeter-${{ env.IMAGE_TAG }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Provision via ArgoCD
  # ─────────────────────────────────────────────────────────────────────────────
  provision:
    name: Provision Ephemeral Env
    runs-on: arc-runners-sgisdevops
    needs: [setup, build]
    env:
      NAMESPACE: ${{ needs.setup.outputs.namespace }}
      TEST_CASE: ${{ needs.setup.outputs.test_case }}
    steps:
      - uses: actions/checkout@v4

      - name: Install ArgoCD CLI
        run: |
          mkdir -p $HOME/.local/bin
          curl -sSL -o $HOME/.local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x $HOME/.local/bin/argocd
          export PATH=$HOME/.local/bin:$PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          argocd version --client

      # - name: Login to ArgoCD
      #   run: |
      #     argocd login ${{ env.ARGOCD_SERVER }} \
      #       --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
      #       --grpc-web \
      #       --plaintext

      - name: Deploy via ArgoCD
        run: |
          VALUES_CASE=$(echo "${{ env.TEST_CASE }}" | tr '-' '_')

          argocd app create ${{ env.NAMESPACE }} \
            ${{ env.ARGOCD_OPTS }} \
            --project wager-tests \
            --repo https://github.com/${{ github.repository }} \
            --revision ${{ github.sha }} \
            --path helm/wager-test-env \
            --dest-server https://F007B6C7CA6712CD44A123FCAF6EDE38.gr7.us-east-1.eks.amazonaws.com \
            --dest-namespace ${{ env.NAMESPACE }} \
            --values values.yaml \
            --values test-cases/${VALUES_CASE}-values.yaml \
            --helm-set wagerSvc.image.repository=${{ env.ECR_REGISTRY }} \
            --helm-set wagerSvc.image.tag=wager-app-${{ env.IMAGE_TAG }} \
            --helm-set wagerSvc.image.pullPolicy=Always \
            --helm-set jmeter.image.repository=${{ env.ECR_REGISTRY }} \
            --helm-set jmeter.image.tag=wager-jmeter-${{ env.IMAGE_TAG }} \
            --helm-set global.runId=${{ needs.setup.outputs.run_id }} \
            --helm-set global.testCase=${{ env.TEST_CASE }} \
            --sync-policy automated \
            --auto-prune \
            --self-heal \
            --upsert \
            --sync-option CreateNamespace=true

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Wait for JMeter Job and collect results
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Run JMeter Tests
    runs-on: arc-runners-sgisdevops
    needs: [setup, provision]
    env:
      NAMESPACE: ${{ needs.setup.outputs.namespace }}
      TEST_CASE: ${{ needs.setup.outputs.test_case }}
      RUN_ID:    ${{ needs.setup.outputs.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Retrieve AWS Credentials from Vault
        run: |
          echo "Sleeping for 10 seconds..."
          sleep 10
          export AWS_ACCESS_KEY_ID=$(kubectl get secrets platform-services-ecr-iam-credentials -o jsonpath={.data.access_key} | base64 -d)
          export AWS_SECRET_ACCESS_KEY=$(kubectl get secrets platform-services-ecr-iam-credentials -o jsonpath={.data.secret_key} | base64 -d)
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 891376915593.dkr.ecr.us-east-1.amazonaws.com

      - name: Install ArgoCD CLI
        run: |
          mkdir -p $HOME/.local/bin
          curl -sSL -o $HOME/.local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x $HOME/.local/bin/argocd
          export PATH=$HOME/.local/bin:$PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          argocd version --client

      # - name: Login to ArgoCD
      #   run: |
      #     argocd login ${{ env.ARGOCD_SERVER }} \
      #       --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
      #       --grpc-web \
      #       --plaintext

      - name: Wait for all services healthy
        run: |
          argocd app wait ${{ env.NAMESPACE }} \
            ${{ env.ARGOCD_OPTS }} \
            --health \
            --timeout 300 || {
              argocd app get ${{ env.NAMESPACE }} \
                ${{ env.ARGOCD_OPTS }}
              exit 1
            }

      # ── FIXED: polls ArgoCD JSON for JMeter Job health status ────────────────
      - name: Wait for JMeter Job to complete
        run: |
          echo "Polling JMeter Job status via ArgoCD (max 10 mins)..."
          STATUS="unknown"

          for i in $(seq 1 60); do
            STATUS=$(argocd app get ${{ env.NAMESPACE }} \
              ${{ env.ARGOCD_OPTS }} \
              --output json 2>/dev/null \
              | python3 scripts/get_job_status.py 2>/dev/null || echo "unknown")

            echo "Attempt ${i}/60 — JMeter Job status: ${STATUS}"

            if [ "${STATUS}" = "Healthy" ] || [ "${STATUS}" = "Succeeded" ]; then
              echo "JMeter Job completed successfully"
              break
            fi

            if [ "${STATUS}" = "Degraded" ] || [ "${STATUS}" = "Failed" ]; then
              echo "ERROR: JMeter Job failed"
              argocd app get ${{ env.NAMESPACE }} ${{ env.ARGOCD_OPTS }}
              exit 1
            fi

            sleep 10
          done

          if [[ "${STATUS}" != "Succeeded" && "${STATUS}" != "Healthy" ]]; then
            echo "ERROR: JMeter Job timed out"
            argocd app get ${{ env.NAMESPACE }} ${{ env.ARGOCD_OPTS }}
            exit 1
          fi

      # ── Results uploaded from JMeter pod directly to GitHub Release ─────────
      - name: Get test results Release URL
        if: always()
        run: |
          echo "========================================"
          echo "  Test Run Summary"
          echo "  Test case : ${{ env.TEST_CASE }}"
          echo "  Run ID    : ${{ env.RUN_ID }}"
          echo "  Results   : https://github.com/${{ github.repository }}/releases/tag/test-results-${{ env.RUN_ID }}"
          echo "========================================"

      # ── S3 download commented out — uncomment when S3 is configured ──────────
      # - name: Download results from S3
      #   run: |
      #     S3_PREFIX="wager-test-results/${{ env.RUN_ID }}/${{ env.TEST_CASE }}"
      #     mkdir -p results/html-report
      #     aws s3 cp \
      #       "s3://${{ env.S3_BUCKET }}/${S3_PREFIX}/test-results.jtl" \
      #       results/test-results.jtl
      #     aws s3 sync \
      #       "s3://${{ env.S3_BUCKET }}/${S3_PREFIX}/html-report/" \
      #       results/html-report/

      # Results live in JMeter pod (app cluster) not runner — commenting out
      # - name: Validate results
      #   run: |
      #     TEST_CASE=${{ env.TEST_CASE }} \
      #       bash scripts/validate-results.sh results/test-results.jtl

      # - name: Upload JMeter HTML report
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: jmeter-report-${{ env.TEST_CASE }}-${{ env.RUN_ID }}
      #     path: results/html-report/

      # - name: Upload JTL
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: jmeter-jtl-${{ env.TEST_CASE }}-${{ env.RUN_ID }}
      #     path: results/test-results.jtl
  teardown:
    name: Teardown Ephemeral Env
    runs-on: arc-runners-sgisdevops
    needs: [setup, test]
    if: always()
    env:
      NAMESPACE: ${{ needs.setup.outputs.namespace }}
    steps:
      - uses: actions/checkout@v4

      - name: Retrieve AWS Credentials from Vault
        run: |
          echo "Sleeping for 10 seconds..."
          sleep 10
          export AWS_ACCESS_KEY_ID=$(kubectl get secrets platform-services-ecr-iam-credentials -o jsonpath={.data.access_key} | base64 -d)
          export AWS_SECRET_ACCESS_KEY=$(kubectl get secrets platform-services-ecr-iam-credentials -o jsonpath={.data.secret_key} | base64 -d)
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 891376915593.dkr.ecr.us-east-1.amazonaws.com

      - name: Install ArgoCD CLI
        run: |
          mkdir -p $HOME/.local/bin
          curl -sSL -o $HOME/.local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x $HOME/.local/bin/argocd
          export PATH=$HOME/.local/bin:$PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          argocd version --client

      # - name: Login to ArgoCD
      #   run: |
      #     argocd login ${{ env.ARGOCD_SERVER }} \
      #       --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
      #       --grpc-web \
      #       --plaintext

      - name: Delete all ephemeral ArgoCD apps
        run: |
          force_delete_app() {
            local APP="$1"
            echo "--- Deleting: $APP"

            # Delete with cascade — removes all resources in namespace
            argocd app delete "$APP" \
              ${{ env.ARGOCD_OPTS }} \
              --cascade \
              --yes 2>/dev/null || true

            # Wait up to 60s for deletion
            for i in $(seq 1 12); do
              if ! argocd app get "$APP" \
                ${{ env.ARGOCD_OPTS }} > /dev/null 2>&1; then
                echo "--- $APP deleted"
                return 0
              fi
              echo "  waiting for $APP to be deleted..."
              sleep 5
            done

            # If still stuck — remove finalizer and force delete
            echo "--- App stuck, removing finalizer: $APP"
            argocd app delete "$APP" \
              ${{ env.ARGOCD_OPTS }} \
              --yes --force 2>/dev/null || true
          }

          echo "=== Deleting: ${{ env.NAMESPACE }} ==="
          force_delete_app "${{ env.NAMESPACE }}"

          echo "=== Cleaning up leftover wager-test-* apps ==="
          argocd app list \
            ${{ env.ARGOCD_OPTS }} \
            --output name 2>/dev/null \
            | grep "^wager-test-" \
            | while read APP; do
                echo "Leftover: $APP"
                force_delete_app "$APP"
              done

          echo "=== Final ArgoCD state ==="
          argocd app list ${{ env.ARGOCD_OPTS }} 2>/dev/null \
            | grep wager || echo "No wager apps remain — clean"

      # - name: Clean up S3 results
      #   run: |
      #     aws s3 rm \
      #       "s3://${{ env.S3_BUCKET }}/wager-test-results/${{ needs.setup.outputs.run_id }}/" \
      #       --recursive 2>/dev/null || echo "S3 cleanup skipped"