name: Wager Ephemeral Test

on:
  workflow_dispatch:
    inputs:
      test_case:
        description: "Test scenario to run"
        required: true
        default: "mega-millions"
        type: choice
        options:
          - mega-millions
          - powerball
          - pick5
      ttl_minutes:
        description: "Namespace TTL (minutes) before force-delete"
        required: false
        default: "30"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: ephemeral-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  ARGOCD_SERVER: YOUR_ARGOCD_SERVER     # <-- e.g. argocd.yourdomain.com
  ECR_REGISTRY:  YOUR_ECR_REGISTRY      # <-- e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com
  AWS_REGION:    YOUR_AWS_REGION        # <-- e.g. us-east-1
  S3_BUCKET:     YOUR_S3_BUCKET         # <-- tools account bucket for test results
  IMAGE_TAG:     ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Resolve test case and namespace name
  # ─────────────────────────────────────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: arc-runner-set
    outputs:
      test_case: ${{ steps.resolve.outputs.test_case }}
      namespace:  ${{ steps.resolve.outputs.namespace }}
      run_id:     ${{ steps.resolve.outputs.run_id }}
    steps:
      - name: Resolve test case and namespace
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TEST_CASE="mega-millions"
            RUN_ID="pr-${{ github.event.pull_request.number }}"
          else
            TEST_CASE="${{ github.event.inputs.test_case }}"
            RUN_ID="run-${{ github.run_id }}"
          fi
          NAMESPACE="wager-test-${RUN_ID}"
          echo "test_case=${TEST_CASE}" >> $GITHUB_OUTPUT
          echo "namespace=${NAMESPACE}"  >> $GITHUB_OUTPUT
          echo "run_id=${RUN_ID}"        >> $GITHUB_OUTPUT
          echo "Test case : ${TEST_CASE}"
          echo "Namespace : ${NAMESPACE}"

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Build and push images to ECR
  #    wager-app    -- the app under test
  #    wager-jmeter -- JMeter + test plan, runs as K8s Job inside the namespace
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build and Push Images
    runs-on: arc-runner-set
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push wager-app
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          platforms: linux/amd64
          tags: ${{ env.ECR_REGISTRY }}/wager-app:${{ env.IMAGE_TAG }}

      - name: Build and push wager-jmeter
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./jmeter-image/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.ECR_REGISTRY }}/wager-jmeter:${{ env.IMAGE_TAG }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Provision via ArgoCD
  #    Deploys: mysql, wiremock-gds, wiremock-esb, wager-svc, jmeter Job
  #    No kubectl. No kubeconfig. ArgoCD API only.
  # ─────────────────────────────────────────────────────────────────────────────
  provision:
    name: Provision Ephemeral Env
    runs-on: arc-runner-set
    needs: [setup, build]
    env:
      NAMESPACE: ${{ needs.setup.outputs.namespace }}
      TEST_CASE: ${{ needs.setup.outputs.test_case }}
    steps:
      - uses: actions/checkout@v4
      - name: Install ArgoCD CLI
        run: |
          mkdir -p $HOME/.local/bin
          curl -sSL -o $HOME/.local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x $HOME/.local/bin/argocd
          export PATH=$HOME/.local/bin:$PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          argocd version --client

      - name: Login to ArgoCD
        run: |
          argocd login ${{ env.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
            --grpc-web \
            --insecure

      - name: Deploy via ArgoCD
        run: |
          VALUES_CASE=$(echo "${{ env.TEST_CASE }}" | tr '-' '_')

          argocd app create ${{ env.NAMESPACE }} \
            --project wager-tests \
            --repo https://github.com/${{ github.repository }} \
            --revision ${{ github.sha }} \
            --path helm/wager-test-env \
            --dest-server https://kubernetes.default.svc \
            --dest-namespace ${{ env.NAMESPACE }} \
            --values values.yaml \
            --values test-cases/${VALUES_CASE}-values.yaml \
            --helm-set wagerSvc.image.repository=${{ env.ECR_REGISTRY }}/wager-app \
            --helm-set wagerSvc.image.tag=${{ env.IMAGE_TAG }} \
            --helm-set wagerSvc.image.pullPolicy=Always \
            --helm-set jmeter.image.repository=${{ env.ECR_REGISTRY }}/wager-jmeter \
            --helm-set jmeter.image.tag=${{ env.IMAGE_TAG }} \
            --helm-set jmeter.s3Bucket=${{ env.S3_BUCKET }} \
            --helm-set global.runId=${{ needs.setup.outputs.run_id }} \
            --helm-set global.testCase=${{ env.TEST_CASE }} \
            --sync-policy automated \
            --auto-prune \
            --self-heal \
            --upsert \
            --grpc-web \
            --insecure

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Wait for JMeter Job, download results from S3
  #    JMeter pod runs inside app cluster, writes to tools account S3 bucket
  #    (app account node role has cross-account write via S3 bucket policy)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Run JMeter Tests
    runs-on: arc-runner-set
    needs: [setup, provision]
    env:
      NAMESPACE: ${{ needs.setup.outputs.namespace }}
      TEST_CASE: ${{ needs.setup.outputs.test_case }}
      RUN_ID:    ${{ needs.setup.outputs.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Install ArgoCD CLI
        run: |
          mkdir -p $HOME/.local/bin
          curl -sSL -o $HOME/.local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x $HOME/.local/bin/argocd
          export PATH=$HOME/.local/bin:$PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          argocd version --client
      - name: Login to ArgoCD
        run: |
          argocd login ${{ env.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
            --grpc-web \
            --insecure

      - name: Wait for all services healthy
        run: |
          argocd app wait ${{ env.NAMESPACE }} \
            --health \
            --timeout 300 \
            --grpc-web --insecure || {
              argocd app get ${{ env.NAMESPACE }} --grpc-web --insecure
              exit 1
            }

      - name: Wait for JMeter Job to complete
        run: |
          echo "Polling JMeter Job status (max 10 mins)..."
          STATUS="unknown"
          for i in $(seq 1 40); do
            STATUS=$(argocd app resources ${{ env.NAMESPACE }} \
              --grpc-web --insecure \
              --kind Job 2>/dev/null \
              | grep "jmeter" | awk '{print $6}' || echo "unknown")

            echo "Attempt ${i}/40 — status: ${STATUS}"

            if [ "${STATUS}" = "Succeeded" ]; then
              echo "JMeter Job completed successfully"
              break
            fi

            if [ "${STATUS}" = "Failed" ]; then
              echo "ERROR: JMeter Job failed"
              argocd app get ${{ env.NAMESPACE }} --grpc-web --insecure
              exit 1
            fi

            sleep 15
          done

          if [ "${STATUS}" != "Succeeded" ]; then
            echo "ERROR: JMeter Job timed out after 10 minutes"
            exit 1
          fi

      - name: Download results from S3
        run: |
          S3_PREFIX="wager-test-results/${{ env.RUN_ID }}/${{ env.TEST_CASE }}"
          mkdir -p results/html-report

          aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${S3_PREFIX}/test-results.jtl" \
            results/test-results.jtl

          aws s3 sync \
            "s3://${{ env.S3_BUCKET }}/${S3_PREFIX}/html-report/" \
            results/html-report/

      - name: Validate results
        run: |
          TEST_CASE=${{ env.TEST_CASE }} \
            bash scripts/validate-results.sh results/test-results.jtl

      - name: Upload JMeter HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-report-${{ env.TEST_CASE }}-${{ env.RUN_ID }}
          path: results/html-report/

      - name: Upload JTL
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-jtl-${{ env.TEST_CASE }}-${{ env.RUN_ID }}
          path: results/test-results.jtl

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Teardown — always runs
  # ─────────────────────────────────────────────────────────────────────────────
  teardown:
    name: Teardown Ephemeral Env
    runs-on: arc-runner-set
    needs: [setup, test]
    if: always()
    env:
      NAMESPACE: ${{ needs.setup.outputs.namespace }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Install ArgoCD CLI
        run: |
          mkdir -p $HOME/.local/bin
          curl -sSL -o $HOME/.local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x $HOME/.local/bin/argocd
          export PATH=$HOME/.local/bin:$PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          argocd version --client
      - name: Login to ArgoCD
        run: |
          argocd login ${{ env.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
            --grpc-web \
            --insecure

      - name: Delete all ephemeral ArgoCD apps
        run: |
          delete_argocd_app() {
            local APP="$1"
            echo "--- Deleting: $APP"
            argocd app delete "$APP" \
              --yes \
              --grpc-web --insecure 2>/dev/null || true
          }

          delete_argocd_app "${{ env.NAMESPACE }}"

          argocd app list \
            --grpc-web --insecure \
            --output name 2>/dev/null \
            | grep "^wager-test-" \
            | while read APP; do
                delete_argocd_app "$APP"
              done

          argocd app list --grpc-web --insecure 2>/dev/null \
            | grep wager || echo "No wager apps remain"

      - name: Clean up S3 results
        run: |
          aws s3 rm \
            "s3://${{ env.S3_BUCKET }}/wager-test-results/${{ needs.setup.outputs.run_id }}/" \
            --recursive 2>/dev/null || echo "S3 cleanup skipped"
